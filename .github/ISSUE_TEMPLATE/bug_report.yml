name: Bug Report
description: Report a bug or unexpected behavior in Whendows
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Open Whendows
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: Whendows Version
      description: Which version of Whendows are you using?
      placeholder: e.g., 1.0.0
    validations:
      required: true

  - type: dropdown
    id: windows-version
    attributes:
      label: Windows Version
      options:
        - Windows 11
        - Windows 10
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: CLI Provider
      description: Which provider were you using when the bug occurred?
      options:
        - Claude
        - Codex
        - Both
        - N/A
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Logs
      description: If applicable, add screenshots or paste relevant log output.
    validations:
      required: false
